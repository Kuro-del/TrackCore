<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>TrackCore – Iniciar sesión</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css?v=10" />

  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    .login-shell {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      padding: 2rem;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.3rem;
      color: var(--primary);
    }

    .login-logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      background: var(--header-bg);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: var(--shadow-md);
    }

    .login-brand strong {
      display: block;
      font-size: 1.15rem;
      color: var(--text);
    }

    .login-brand span {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .login-title {
      margin: 0 0 0.35rem;
      font-size: 1.55rem;
      color: var(--text);
    }

    .login-subtitle {
      margin: 0 0 1.4rem;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-actions {
      margin-top: 0.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .login-actions .btn {
      width: 100%;
    }

    .login-message {
      display: none;
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .login-message.error {
      display: block;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #efbcc1;
    }

    .login-message.ok {
      display: block;
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #b8dfcf;
    }

    .login-footer {
      margin-top: 1.3rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .password-wrap {
  position: relative;
  width: 100%;
}

.password-wrap input {
  width: 100%;
  box-sizing: border-box;
  padding-right: 4.6rem;
  min-height: 46px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
}

.password-wrap input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px var(--primary-soft);
}

.toggle-password {
  position: absolute;
  right: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: transparent;
  color: var(--primary);
  font-weight: 900;
  cursor: pointer;
  padding: 0.25rem 0.35rem;
  font-size: 0.9rem;
}

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.45rem;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--primary);
      font-weight: 800;
      cursor: pointer;
      padding: 0.35rem;
    }

                .forgot-link {
            display: inline-flex;
            justify-content: center;
            text-align: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
            }

        .forgot-link:hover {
        text-decoration: underline;
        }

    @media (max-width: 480px) {
      .login-card {
        padding: 1.4rem;
      }

      .login-title {
        font-size: 1.35rem;
      }
    }
  </style>
</head>

<body>
  <main class="login-shell">
    <section class="card login-card">
      <div class="login-brand">
        <div class="login-logo" aria-hidden="true">
          <svg width="23" height="23" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M3 5a2 2 0 0 1 2-2h6v4H5a2 2 0 0 1-2-2zm10-2h4a2 2 0 0 1 2 2v4h-6V3zm6 10v4a2 2 0 0 1-2 2h-4v-6h6zM11 13v6H5a2 2 0 0 1-2-2v-4h8z"
            />
          </svg>
        </div>

        <div>
          <strong>TrackCore</strong>
          <span>Sistema de inventario automotriz</span>
        </div>
      </div>

      <h1 class="login-title">Iniciar sesión</h1>

      <p class="login-subtitle">
        Ingresa con tu usuario y contraseña para acceder al panel de inventario,
        Kardex y reportes.
      </p>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="usuario">Usuario</label>
          <input
            id="usuario"
            name="usuario"
            type="text"
            placeholder="Ej: admin"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
  <label for="password">Contraseña</label>

  <div class="password-wrap">
    <input
      id="password"
      name="password"
      type="password"
      placeholder="Ingresa tu contraseña"
      autocomplete="current-password"
      required
    />

    <button
      type="button"
      id="togglePassword"
      class="toggle-password"
    >
      Ver
    </button>
  </div>
</div>

        <div id="loginMessage" class="login-message"></div>

        <div class="login-actions">
          <button id="loginBtn" type="submit" class="btn primary">
            Entrar al sistema
          </button>

           <a href="recuperar.html" class="forgot-link">
            ¿Olvidaste tu contraseña?
            </a>
        </div>
      </form>

      <p class="login-footer">
        Productos Automotrices de Nicaragua
      </p>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const usuarioInput = document.getElementById('usuario');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginMessage = document.getElementById('loginMessage');
    const togglePassword = document.getElementById('togglePassword');

    function showMessage(message, ok = false) {
      loginMessage.textContent = message;
      loginMessage.className = 'login-message ' + (ok ? 'ok' : 'error');
    }

    function clearMessage() {
      loginMessage.textContent = '';
      loginMessage.className = 'login-message';
    }

    async function checkCurrentSession() {
      try {
        const response = await fetch('/api/auth/me', {
          credentials: 'include'
        });

        const data = await response.json();

        if (data.authenticated) {
          window.location.href = 'index.html';
        }
      } catch (error) {
        console.error(error);
      }
    }

    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';

      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? 'Ocultar' : 'Ver';
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      clearMessage();

      const usuario = usuarioInput.value.trim();
      const password = passwordInput.value;

      if (!usuario || !password) {
        showMessage('Ingresa usuario y contraseña.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Validando...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({
            usuario,
            password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'No se pudo iniciar sesión.');
        }

        showMessage('Sesión iniciada correctamente. Redirigiendo...', true);

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
      } catch (error) {
        showMessage(error.message || 'Usuario o contraseña incorrectos.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Entrar al sistema';
      }
    });

    checkCurrentSession();
  </script>
</body>
</html>
