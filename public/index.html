<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>TrackCore – Inicio</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <link rel="stylesheet" href="style.css?v=10">
  <style>
    /* Estilos del escáner */
    #scannerContainer {
      width: 100%;
      max-width: 760px;
      height: 430px;
      margin-top: 1rem;
      background: #000;
      display: none;
      overflow: hidden;
      position: relative;
      border-radius: 10px;
    }
    #scannerContainer video,
    #scannerContainer canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    .scanner-line {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 3px;
      background: #dc2626;
      z-index: 10;
      opacity: 0.85;
    }
    .scanner-result, .scanner-error {
      display: none;
      margin-top: 0.75rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-weight: 800;
    }
    .scanner-result {
      border: 1px solid #bbf7d0;
      background: #ecfdf5;
      color: #166534;
    }
    .scanner-error {
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <strong>Pantalla Principal</strong>
    </div>
  </header>

  <main class="container">
    <section class="card quick-search">
      <h2>Búsqueda rápida</h2>
      <div style="display:grid;grid-template-columns:1fr auto auto;gap:0.5rem;align-items:end;">
        <input type="text" id="quickSearchInput" placeholder="Escribí o escaneá un código de barras" autocomplete="off">
        <button id="searchBtn" class="btn primary">Buscar</button>
        <button id="scanBtn" class="btn btn-light">Escanear</button>
      </div>
      <div id="searchResult" style="margin-top:0.75rem;"></div>
    </section>
  </main>

  <!-- Modal del escáner -->
  <dialog id="scannerModal" class="modal">
    <div class="card">
      <header class="modal-header">
        <h3>Escanear código de barras</h3>
        <button type="button" id="closeScanner" class="btn ghost">✕</button>
      </header>

      <div class="field">
        <label for="scannerCamera">Cámara disponible</label>
        <select id="scannerCamera">
          <option value="">Presioná “Cargar cámaras”</option>
        </select>
      </div>

      <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
        <button id="loadScannerCameras" class="btn btn-light">Cargar cámaras</button>
        <button id="startScanner" class="btn primary">Iniciar escáner</button>
        <button id="stopScanner" class="btn danger" style="display:none;">Detener cámara</button>
      </div>

      <div id="scannerContainer">
        <div class="scanner-line"></div>
      </div>

      <div id="scannerResult" class="scanner-result"></div>
      <div id="scannerError" class="scanner-error"></div>

      <footer class="modal-footer">
        <button type="button" id="cancelScanner" class="btn ghost">Cancelar</button>
      </footer>
    </div>
  </dialog>

  <script>
    const quickSearchInput = document.getElementById('quickSearchInput');
    const searchResult = document.getElementById('searchResult');

    const scanBtn = document.getElementById('scanBtn');
    const scannerModal = document.getElementById('scannerModal');
    const scannerCamera = document.getElementById('scannerCamera');
    const scannerContainer = document.getElementById('scannerContainer');
    const scannerResult = document.getElementById('scannerResult');
    const scannerError = document.getElementById('scannerError');
    const loadScannerCameras = document.getElementById('loadScannerCameras');
    const startScanner = document.getElementById('startScanner');
    const stopScanner = document.getElementById('stopScanner');
    const closeScanner = document.getElementById('closeScanner');
    const cancelScanner = document.getElementById('cancelScanner');

    let scannerActivo = false;
    let ultimoCodigo = null;
    let repeticiones = 0;

    function hideScannerMessages() {
      scannerResult.style.display = 'none';
      scannerError.style.display = 'none';
      scannerResult.textContent = '';
      scannerError.textContent = '';
    }

    async function cargarCamaras() {
      hideScannerMessages();
      try {
        const permiso = await navigator.mediaDevices.getUserMedia({video:true});
        permiso.getTracks().forEach(track => track.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d=>d.kind==='videoinput');
        scannerCamera.innerHTML = '';
        if(cams.length===0) {
          scannerCamera.innerHTML = '<option>No se encontraron cámaras</option>';
          scannerError.style.display='block';
          scannerError.textContent='No se encontró ninguna cámara.';
          return;
        }
        cams.forEach((cam,i)=>{
          const option = document.createElement('option');
          option.value = cam.deviceId;
          option.textContent = cam.label || 'Cámara ' + (i+1);
          scannerCamera.appendChild(option);
        });
        const idx = cams.findIndex(c=>c.label.toLowerCase().includes('droidcam'));
        scannerCamera.selectedIndex = idx>=0?idx:0;
      } catch(e){
        console.error(e);
        scannerError.style.display='block';
        scannerError.textContent='Error al acceder a la cámara. Verifica permisos.';
      }
    }

    function iniciarScanner(){
      hideScannerMessages();
      const cameraId = scannerCamera.value;
      if(!cameraId){scannerError.textContent='Selecciona una cámara.';scannerError.style.display='block'; return;}
      if(scannerActivo) return;
      scannerContainer.style.display='block';
      Quagga.init({
        inputStream:{
          type:'LiveStream',
          target:scannerContainer,
          constraints:{
            deviceId:{exact:cameraId},
            width:{ideal:1280},
            height:{ideal:720}
          },
          area:{top:'20%', right:'5%', left:'5%', bottom:'20%'}
        },
        locator:{patchSize:'medium', halfSample:false},
        numOfWorkers:navigator.hardwareConcurrency||4,
        decoder:{readers:['upc_reader','ean_reader','code_128_reader','code_39_reader'], multiple:false},
        locate:true
      },function(err){
        if(err){console.error(err); scannerError.style.display='block'; scannerError.textContent='No se pudo iniciar el escáner'; scannerContainer.style.display='none'; return;}
        Quagga.start();
        scannerActivo = true;
        startScanner.style.display='none';
        stopScanner.style.display='inline-block';
        loadScannerCameras.disabled=true;
      });
      Quagga.offDetected(onDetected);
      Quagga.onDetected(onDetected);
    }

    function onDetected(data){
      if(!data||!data.codeResult||!data.codeResult.code) return;
      const code = data.codeResult.code;
      if(code===ultimoCodigo){repeticiones++;} else {ultimoCodigo=code; repeticiones=1;}
      if(repeticiones<2) return;
      quickSearchInput.value = code;
      scannerResult.textContent = `Código detectado: ${code} (${data.codeResult.format})`;
      scannerResult.style.display='block';
      detenerScanner();
      scannerModal.close();
    }

    function detenerScanner(){
      if(!scannerActivo) return;
      try{Quagga.stop();scannerActivo=false;scannerContainer.style.display='none';startScanner.style.display='inline-block';stopScanner.style.display='none';loadScannerCameras.disabled=false;ultimoCodigo=null;repeticiones=0;} catch(e){console.error(e); scannerError.style.display='block'; scannerError.textContent='Error al detener la cámara';}
    }

    scanBtn.addEventListener('click',()=>scannerModal.showModal());
    loadScannerCameras.addEventListener('click',cargarCamaras);
    startScanner.addEventListener('click',iniciarScanner);
    stopScanner.addEventListener('click',detenerScanner);
    closeScanner.addEventListener('click',()=>{detenerScanner();scannerModal.close();});
    cancelScanner.addEventListener('click',()=>{detenerScanner();scannerModal.close();});

  </script>
</body>
</html>
